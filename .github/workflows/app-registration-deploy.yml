name: App Registration Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'deployments/azure/app-registration/**/*.tf'
      - 'deployments/azure/app-registration/**/*.tfvars'
      - '!deployments/azure/app-registration/**/*.md'

  workflow_dispatch:
    inputs:
      grant_admin_consent:
        description: 'Grant admin consent for API permissions'
        required: false
        type: boolean
        default: false
      skip_validation:
        description: 'Skip pre-deployment validation (emergency use only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # For Azure OIDC authentication
  issues: write    # For creating issues on deployment failures

env:
  TERRAFORM_VERSION: '1.6.0'
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  pre-deployment-validation:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_validation != 'true'
    
    outputs:
      validation_passed: ${{ steps.final-check.outputs.validation_passed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Azure CLI
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      - name: Run pre-deployment owner verification
        id: verify-owners
        run: |
          cd deployments/azure/app-registration
          chmod +x scripts/verify-owners.sh
          
          VERIFICATION_OUTPUT=$(./scripts/verify-owners.sh 2>&1 || true)
          echo "$VERIFICATION_OUTPUT" | jq '.'
          
          if echo "$VERIFICATION_OUTPUT" | jq -e '.validation_passed == true' > /dev/null 2>&1; then
            echo "verification_passed=true" >> $GITHUB_OUTPUT
            echo "::notice::Pre-deployment owner verification passed"
          else
            echo "verification_passed=false" >> $GITHUB_OUTPUT
            echo "::error::Pre-deployment owner verification failed"
            ERRORS=$(echo "$VERIFICATION_OUTPUT" | jq -r '.validation_errors[]' 2>/dev/null || echo "Failed to parse errors")
            echo "::error::$ERRORS"
          fi
        continue-on-error: true
      
      - name: Run pre-deployment permission validation
        id: validate-permissions
        run: |
          cd deployments/azure/app-registration
          chmod +x scripts/validate-permissions.sh
          
          VALIDATION_OUTPUT=$(./scripts/validate-permissions.sh 2>&1 || true)
          echo "$VALIDATION_OUTPUT" | jq '.'
          
          if echo "$VALIDATION_OUTPUT" | jq -e '.validation_passed == true' > /dev/null 2>&1; then
            echo "validation_passed=true" >> $GITHUB_OUTPUT
            echo "::notice::Pre-deployment permission validation passed"
          else
            echo "validation_passed=false" >> $GITHUB_OUTPUT
            echo "::error::Pre-deployment permission validation failed"
            ERRORS=$(echo "$VALIDATION_OUTPUT" | jq -r '.validation_errors[]' 2>/dev/null || echo "Failed to parse errors")
            echo "::error::$ERRORS"
          fi
        continue-on-error: true
      
      - name: Final validation check
        id: final-check
        run: |
          OWNER_PASS="${{ steps.verify-owners.outputs.verification_passed }}"
          PERM_PASS="${{ steps.validate-permissions.outputs.validation_passed }}"
          
          if [ "$OWNER_PASS" = "true" ] && [ "$PERM_PASS" = "true" ]; then
            echo "validation_passed=true" >> $GITHUB_OUTPUT
            echo "::notice::All pre-deployment validations passed"
          else
            echo "validation_passed=false" >> $GITHUB_OUTPUT
            echo "::error::Pre-deployment validation failed - deployment blocked"
            exit 1
          fi

  deploy:
    name: Deploy App Registration
    runs-on: ubuntu-latest
    needs: pre-deployment-validation
    if: always() && (needs.pre-deployment-validation.outputs.validation_passed == 'true' || github.event.inputs.skip_validation == 'true')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Azure CLI
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      
      - name: Terraform Init
        working-directory: deployments/azure/app-registration
        run: terraform init
      
      - name: Terraform Plan
        id: plan
        working-directory: deployments/azure/app-registration
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan_output.txt
          
          # Check for lifecycle precondition failures
          if grep -q "Error: Resource precondition failed" plan_output.txt; then
            echo "::error::Terraform lifecycle preconditions failed during deployment plan"
            cat plan_output.txt
            exit 1
          fi
        continue-on-error: false
      
      - name: Terraform Apply
        id: apply
        working-directory: deployments/azure/app-registration
        run: |
          terraform apply -auto-approve tfplan 2>&1 | tee apply_output.txt
          
          # Capture application details
          APP_ID=$(terraform output -raw application_id 2>/dev/null || echo "N/A")
          APP_NAME=$(terraform output -raw application_name 2>/dev/null || echo "N/A")
          SP_ID=$(terraform output -raw service_principal_id 2>/dev/null || echo "N/A")
          
          echo "application_id=$APP_ID" >> $GITHUB_OUTPUT
          echo "application_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "service_principal_id=$SP_ID" >> $GITHUB_OUTPUT
        continue-on-error: false
      
      - name: Grant Admin Consent (if requested)
        if: github.event.inputs.grant_admin_consent == 'true' || vars.AUTO_GRANT_ADMIN_CONSENT == 'true'
        run: |
          APP_ID="${{ steps.apply.outputs.application_id }}"
          
          if [ "$APP_ID" = "N/A" ] || [ -z "$APP_ID" ]; then
            echo "::error::Cannot grant admin consent - application ID not available"
            exit 1
          fi
          
          echo "::notice::Granting admin consent for application $APP_ID"
          
          # Get service principal object ID
          SP_OBJECT_ID=$(az ad sp list --filter "appId eq '$APP_ID'" --query "[0].id" -o tsv)
          
          if [ -z "$SP_OBJECT_ID" ]; then
            echo "::error::Service principal not found for application $APP_ID"
            exit 1
          fi
          
          # Grant admin consent for Microsoft Graph permissions
          GRAPH_SP_ID=$(az ad sp list --filter "appId eq '00000003-0000-0000-c000-000000000000'" --query "[0].id" -o tsv)
          
          # Get required permissions from app registration
          REQUIRED_PERMISSIONS=$(az ad app show --id "$APP_ID" --query "requiredResourceAccess[?resourceAppId=='00000003-0000-0000-c000-000000000000'].resourceAccess[].id" -o tsv)
          
          for PERM_ID in $REQUIRED_PERMISSIONS; do
            echo "::notice::Granting permission $PERM_ID"
            az ad app permission grant --id "$APP_ID" --api 00000003-0000-0000-c000-000000000000 --scope "$PERM_ID" || true
          done
          
          # Grant admin consent via Azure CLI
          az ad app permission admin-consent grant --id "$APP_ID" || echo "::warning::Admin consent grant may require manual approval in Azure Portal"
          
          echo "::notice::Admin consent granted successfully"
      
      - name: Store deployment metadata
        run: |
          mkdir -p deployments/azure/app-registration/.deployment-history
          
          cat > deployments/azure/app-registration/.deployment-history/deploy-$(date +%Y%m%d-%H%M%S).json <<EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit_sha": "${{ github.sha }}",
            "commit_message": "$(git log -1 --pretty=%B | head -1)",
            "actor": "${{ github.actor }}",
            "application_id": "${{ steps.apply.outputs.application_id }}",
            "application_name": "${{ steps.apply.outputs.application_name }}",
            "service_principal_id": "${{ steps.apply.outputs.service_principal_id }}",
            "admin_consent_granted": "${{ github.event.inputs.grant_admin_consent == 'true' || vars.AUTO_GRANT_ADMIN_CONSENT == 'true' }}",
            "workflow_run_id": "${{ github.run_id }}",
            "workflow_run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          
          echo "::notice::Deployment metadata stored"
      
      - name: Send deployment notification
        if: always()
        uses: actions/github-script@v7
        env:
          NOTIFICATION_EMAILS: ${{ vars.APP_REGISTRATION_NOTIFICATION_EMAILS }}
        with:
          script: |
            const deployStatus = '${{ job.status }}';
            const appId = '${{ steps.apply.outputs.application_id }}';
            const appName = '${{ steps.apply.outputs.application_name }}';
            const commitSha = context.sha.substring(0, 7);
            const actor = context.actor;
            
            const emoji = deployStatus === 'success' ? '✅' : '❌';
            const statusText = deployStatus === 'success' ? 'SUCCESSFUL' : 'FAILED';
            
            // Create issue for deployment notification
            const issueBody = `## ${emoji} App Registration Deployment ${statusText}\n\n` +
              `**Application Name:** ${appName || 'N/A'}\n` +
              `**Application ID:** ${appId || 'N/A'}\n` +
              `**Commit:** ${commitSha}\n` +
              `**Deployed by:** @${actor}\n` +
              `**Timestamp:** ${new Date().toISOString()}\n` +
              `**Status:** ${statusText}\n\n` +
              `---\n\n` +
              `[View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n` +
              `<sub>🤖 This notification was automatically generated by the App Registration Deploy workflow.</sub>`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${emoji} App Registration Deployment: ${appName || 'Unknown'} - ${statusText}`,
              body: issueBody,
              labels: ['app-registration', 'deployment', deployStatus === 'success' ? 'deployed' : 'deployment-failed']
            });
            
            core.info(`Deployment notification issue created`);

  post-deployment-audit:
    name: Post-Deployment Audit
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Azure CLI
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Verify deployed application
        run: |
          APP_ID="${{ needs.deploy.outputs.application_id }}"
          
          if [ "$APP_ID" = "N/A" ] || [ -z "$APP_ID" ]; then
            echo "::warning::Cannot verify deployment - application ID not available"
            exit 0
          fi
          
          echo "::notice::Verifying application $APP_ID exists in Azure AD"
          
          # Verify application exists
          APP_EXISTS=$(az ad app show --id "$APP_ID" --query "appId" -o tsv 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$APP_EXISTS" = "NOT_FOUND" ]; then
            echo "::error::Application $APP_ID not found in Azure AD after deployment"
            exit 1
          fi
          
          echo "::notice::Application verified successfully"
          
          # Verify service principal exists
          SP_EXISTS=$(az ad sp list --filter "appId eq '$APP_ID'" --query "[0].appId" -o tsv 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$SP_EXISTS" = "NOT_FOUND" ]; then
            echo "::error::Service principal not found for application $APP_ID"
            exit 1
          fi
          
          echo "::notice::Service principal verified successfully"
          
          # Verify owners
          OWNERS=$(az ad app owner list --id "$APP_ID" --query "[].id" -o tsv)
          OWNER_COUNT=$(echo "$OWNERS" | wc -l)
          
          if [ "$OWNER_COUNT" -lt 2 ]; then
            echo "::error::Application has fewer than 2 owners (found: $OWNER_COUNT)"
            exit 1
          fi
          
          echo "::notice::Owner verification passed ($OWNER_COUNT owners)"
      
      - name: Log deployment to audit trail
        run: |
          echo "::notice::Deployment audit completed successfully"
          echo "Application deployed and verified at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
